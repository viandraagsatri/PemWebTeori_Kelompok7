<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin | SI-AKSI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <h2>Dashboard Admin</h2>
            <p class="subtitle">Panel Kendali Utama SI-AKSI</p>

            <div class="alert-box">
                <strong>Status Sistem:</strong> Semua fitur berjalan normal.
            </div>

            <form>

                <div class="input-group">
                    <label>Total Pengguna Terdaftar</label>
                    <input type="text" value="120 Pengguna" readonly>
                </div>

                <div class="input-group">
                    <label>Menunggu Verifikasi</label>
                    <input type="text" value="15 Pengguna" readonly>
                </div>

                <div class="input-group">
                    <label>Total Bank Soal</label>
                    <input type="text" value="85 Soal" readonly>
                </div>

                <button type="button" class="login-btn" onclick="window.location.href='verify-users.html'">
                    Verifikasi Pengguna
                </button>

                <br><br>

                <button type="button" class="login-btn" onclick="window.location.href='manage-quiz.html'">
                    Kelola Bank Soal
                </button>

            </form>

            <p class="register-link">
                <a href="index.html">Logout</a>
            </p>
        </div>
    </div>

</body>
</html>
